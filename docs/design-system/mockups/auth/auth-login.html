<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OGGVO v2 · Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/tailwind-config.js"></script>
  <script src="../assets/theme.js"></script>
  <link rel="stylesheet" href="../assets/shell.css" />
</head>
<body class="bg-gray-100 text-gray-700">
  <button onclick="dsToggleTheme()" title="Toggle theme" class="icon-btn fixed top-4 right-4 bg-white border border-gray-200 shadow-card z-50"><svg class="theme-sun" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path stroke-linecap="round" d="M12 3v2m0 14v2M3 12h2m14 0h2M5.6 5.6l1.4 1.4m10 10l1.4 1.4m0-13.8l-1.4 1.4m-10 10l-1.4 1.4"/></svg><svg class="theme-moon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 13a8 8 0 11-9-9 6.5 6.5 0 109 9z"/></svg></button>

  <div class="min-h-screen grid place-items-center p-4">
    <div class="w-full max-w-md space-y-3">

      <div class="flex items-center justify-between">
        <a href="../index.html" class="text-sm text-primary-600 hover:underline">← All mockups</a>
        <p class="mock-note">PUBLIC · /login · no portal shell</p>
      </div>

      <!-- Login card -->
      <div class="bg-white border border-gray-200 rounded-card shadow-card p-8">
        <!-- brand -->
        <div class="flex flex-col items-center text-center mb-6">
          <div class="h-10 w-10 rounded-card bg-gradient-to-br from-primary-400 to-primary-600 text-white grid place-items-center font-bold">O</div>
          <h1 class="text-xl font-semibold text-gray-900 mt-3">Welcome back</h1>
          <p class="text-sm text-gray-500 mt-1">Sign in to your OGGVO workspace</p>
        </div>

        <form id="loginForm" class="space-y-4" onsubmit="return false" novalidate>
          <div class="space-y-1.5">
            <label class="text-sm font-medium text-gray-700">Email</label>
            <input id="loginEmail" type="email" autocomplete="email" placeholder="you@business.com"
              class="w-full h-10 px-3 rounded-card border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary-200" />
            <p id="loginEmailErr" class="text-xs text-error-600 hidden"></p>
          </div>

          <div class="space-y-1.5">
            <label class="text-sm font-medium text-gray-700">Password</label>
            <div class="relative">
              <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••"
                class="w-full h-10 pl-3 pr-10 rounded-card border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary-200" />
              <button id="loginPwToggle" type="button" aria-label="Show password"
                class="absolute inset-y-0 right-0 w-10 grid place-items-center text-gray-400 hover:text-gray-600">
                <svg id="loginEyeOpen" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg id="loginEyeOff" class="h-5 w-5 hidden" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M10.6 10.6a3 3 0 004.2 4.2M9.9 5.7A9.6 9.6 0 0112 5.5c6 0 9.5 6.5 9.5 6.5a16 16 0 01-2.6 3.3M6.2 6.7A16 16 0 002.5 12S6 18.5 12 18.5a9.3 9.3 0 003.2-.55"/></svg>
              </button>
            </div>
            <p id="loginPasswordErr" class="text-xs text-error-600 hidden"></p>
          </div>

          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 text-gray-600 select-none">
              <input id="loginRemember" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-primary-500 focus:ring-primary-200" />
              Remember me
            </label>
            <a href="#" class="text-primary-600 hover:underline font-medium">Forgot password?</a>
          </div>

          <p id="loginRememberNote" class="text-xs text-gray-500 hidden"></p>

          <button id="loginSubmit" type="submit"
            class="w-full h-11 rounded-card bg-primary-500 text-white font-medium hover:bg-primary-600 disabled:opacity-60">Sign in</button>

          <div id="loginStatus" class="hidden rounded-card px-3 py-2 text-sm text-center"></div>
        </form>

        <!-- divider -->
        <div class="flex items-center gap-3 my-5">
          <span class="h-px flex-1 bg-gray-200"></span>
          <span class="text-xs text-gray-400 uppercase tracking-wide">or</span>
          <span class="h-px flex-1 bg-gray-200"></span>
        </div>

        <!-- social -->
        <div class="space-y-2.5">
          <button type="button" data-social="Google" class="w-full h-11 rounded-card border border-gray-300 bg-white flex items-center justify-center gap-2 hover:bg-gray-50">
            <span class="h-5 w-5 rounded-full grid place-items-center text-[11px] font-bold text-white" style="background:#dc4e41">G</span>
            <span class="text-sm font-medium text-gray-700">Continue with Google</span>
          </button>
          <button type="button" data-social="LinkedIn" class="w-full h-11 rounded-card border border-gray-300 bg-white flex items-center justify-center gap-2 hover:bg-gray-50">
            <span class="h-5 w-5 rounded-full grid place-items-center text-[11px] font-bold text-white" style="background:#0077b5">in</span>
            <span class="text-sm font-medium text-gray-700">Continue with LinkedIn</span>
          </button>
        </div>
        <p id="loginSocialNote" class="text-xs text-gray-500 text-center mt-2 hidden"></p>

        <p class="text-sm text-center text-gray-600 mt-6">
          Don't have an account?
          <a href="auth-signup.html" class="text-primary-600 hover:underline font-medium">Sign up</a>
        </p>
      </div>

      <p class="mock-note">POST /auth/login → 15-min access JWT + rotating refresh token (auth_sessions). v1 /refresh was unauthenticated — v2 rotates.</p>
    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById('loginForm');
      var email = document.getElementById('loginEmail');
      var pw = document.getElementById('loginPassword');
      var emailErr = document.getElementById('loginEmailErr');
      var pwErr = document.getElementById('loginPasswordErr');
      var status = document.getElementById('loginStatus');
      var submit = document.getElementById('loginSubmit');
      var toggle = document.getElementById('loginPwToggle');
      var eyeOpen = document.getElementById('loginEyeOpen');
      var eyeOff = document.getElementById('loginEyeOff');
      var remember = document.getElementById('loginRemember');
      var rememberNote = document.getElementById('loginRememberNote');
      var socialNote = document.getElementById('loginSocialNote');
      var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      function showErr(el, input, msg) {
        el.textContent = msg;
        el.classList.remove('hidden');
        if (input) input.classList.add('border-error-500');
      }
      function clearErr(el, input) {
        el.classList.add('hidden');
        el.textContent = '';
        if (input) input.classList.remove('border-error-500');
      }
      function setStatus(msg, kind) {
        status.textContent = msg;
        status.className = 'rounded-card px-3 py-2 text-sm text-center ' +
          (kind === 'success'
            ? 'bg-success-100 text-success-700'
            : 'bg-primary-50 text-primary-700');
        status.classList.remove('hidden');
      }

      // Password show / hide
      toggle.addEventListener('click', function () {
        var show = pw.type === 'password';
        pw.type = show ? 'text' : 'password';
        eyeOpen.classList.toggle('hidden', show);
        eyeOff.classList.toggle('hidden', !show);
        toggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      });

      email.addEventListener('input', function () { clearErr(emailErr, email); });
      pw.addEventListener('input', function () { clearErr(pwErr, pw); });

      // Remember me toggle note
      remember.addEventListener('change', function () {
        rememberNote.textContent = remember.checked
          ? 'Remembered — refresh token will persist for 30 days on this device.'
          : 'Not remembered — session ends when you close the browser.';
        rememberNote.classList.remove('hidden');
      });

      // Submit
      form.addEventListener('submit', function () {
        clearErr(emailErr, email);
        clearErr(pwErr, pw);
        status.classList.add('hidden');
        var ok = true;
        if (!EMAIL_RE.test(email.value.trim())) {
          showErr(emailErr, email, 'Enter a valid email address.');
          ok = false;
        }
        if (!pw.value) {
          showErr(pwErr, pw, 'Password is required.');
          ok = false;
        }
        if (!ok) return;

        submit.disabled = true;
        var original = submit.textContent;
        submit.textContent = 'Signing in…';
        setStatus('Signing in…', 'info');
        setTimeout(function () {
          setStatus('Signed in — POST /auth/login would return an access JWT + refresh token here. (mockup, no navigation)', 'success');
          submit.disabled = false;
          submit.textContent = original;
        }, 900);
      });

      // Social buttons
      Array.prototype.forEach.call(document.querySelectorAll('[data-social]'), function (btn) {
        btn.addEventListener('click', function () {
          socialNote.textContent = 'Would redirect to ' + btn.getAttribute('data-social') +
            ' OAuth, then return to /auth/login/callback. (mockup)';
          socialNote.classList.remove('hidden');
        });
      });
    })();
  </script>
</body>
</html>
