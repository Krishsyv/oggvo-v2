  <p class="mock-note mt-6">GET /contacts?with_phone_number=1 (infinite scroll). Send → POST /messages with recipients[] (1 credit per recipient + per attachment).</p>

<script src="../assets/shell.js"></script>
<script>
  OggvoShell.mount({ active: "connect", storyDomain: "messaging", back: { href: "connect-inbox.html", label: "Back to Connect" }, route: "/connect/new", search: "Search…" });
</script>
<script>
  (function () {
    var list = document.getElementById("recip-list");
    var labels = [].slice.call(list.querySelectorAll("label"));
    var countEl = document.getElementById("recip-count");
    var clearBtn = document.getElementById("recip-clear");
    var sendN = document.getElementById("recip-n");
    var search = document.getElementById("recip-search");

    function cb(l) { return l.querySelector('input[type="checkbox"]'); }
    function update() {
      var checked = labels.filter(function (l) { return cb(l).checked; });
      labels.forEach(function (l) { l.classList.toggle("bg-primary-50", cb(l).checked); });
      var n = checked.length;
      countEl.textContent = n + " selected";
      clearBtn.textContent = "Unselect all (" + n + ")";
      sendN.textContent = n;
    }
    list.addEventListener("change", function (e) { if (e.target.matches('input[type="checkbox"]')) update(); });
    clearBtn.addEventListener("click", function () { labels.forEach(function (l) { if (!cb(l).disabled) cb(l).checked = false; }); update(); });
    search.addEventListener("input", function () {
      var q = (search.value || "").toLowerCase().trim();
      labels.forEach(function (l) {
        var name = (l.querySelector(".font-medium") || {}).textContent || "";
        l.classList.toggle("hidden", !!q && name.toLowerCase().indexOf(q) === -1);
      });
    });
    document.getElementById("recip-send").addEventListener("click", function () {
      var n = labels.filter(function (l) { return cb(l).checked; }).length;
      if (!n) { OggvoShell.toast("Pick at least one recipient", "error"); return; }
      OggvoShell.toast("Sent to " + n + " recipient" + (n === 1 ? "" : "s"), "success");
    });

    // Schedule switch
    var sw = document.querySelector("[data-switch]");
    sw.addEventListener("click", function () {
      var on = sw.getAttribute("aria-checked") !== "true";
      sw.setAttribute("aria-checked", on ? "true" : "false");
      sw.classList.toggle("bg-primary-500", on); sw.classList.toggle("bg-gray-200", !on);
      var k = sw.querySelector("span"); k.classList.toggle("translate-x-5", on); k.classList.toggle("translate-x-0.5", !on);
    });

    update();
  })();
</script>
</body>
</html>
